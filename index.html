<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보보안센터 일일 보안 알람 - NASA</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-amber: #f59e0b;
            --accent-purple: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 헤더 영역 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 16px 24px;
            border-radius: 12px;
        }

        .header-title-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .agent-logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 6px 14px;
            border-radius: 8px;
        }

        .agent-avatar-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--accent-blue);
        }

        .agent-info {
            display: flex;
            flex-direction: column;
        }

        .agent-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-blue);
            line-height: 1.2;
        }

        .agent-sub {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .main-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .system-time {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 대시보드 레이아웃 */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1.15fr 1fr;
            gap: 20px;
            flex: 1;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100%;
        }

        /* 카드 공통 스타일 */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 18px 22px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        /* 뷰포인트 카드를 2, CVE 탐색 카드를 1 비율로 배치 */
        .right-column .ciso-card {
            flex: 2;
            min-height: 0;
        }

        .right-column .cve-archive-card {
            flex: 1;
            min-height: 0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--card-border);
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 1. 왼쪽 메인: 뉴스 섹션 및 탭 버튼 */
        .news-section {
            height: 100%;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent-blue);
        }

        .tab-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-blue);
            color: #60a5fa;
        }

        .news-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
            max-height: 520px;
        }

        .news-item {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 12px 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .news-item:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            background-color: rgba(30, 41, 59, 0.9);
        }

        .news-header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .news-date {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .news-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }

        /* 오른쪽 1: 오늘의 보안 뷰포인트 */
        .ciso-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-left: 4px solid var(--accent-blue);
        }

        .ciso-box {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 10px;
            padding: 18px;
            flex: 1;
            display: flex;
            align-items: center;
            overflow-y: auto;
        }

        #ciso-view-text {
            font-size: 17px;
            line-height: 1.6;
            color: #ffffff;
            font-weight: 700;
            word-break: keep-all;
            white-space: pre-line;
        }

        /* 오른쪽 2: 무작위 취약점 탐색 카드 */
        .cve-archive-card {
            border-left: 4px solid var(--accent-purple);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cve-archive-card:hover {
            border-color: #a78bfa;
            background-color: rgba(30, 41, 59, 0.95);
        }

        .cve-archive-body {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            background: rgba(15, 23, 42, 0.4);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
        }

        .cve-badge-code {
            font-size: 12px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(139, 92, 246, 0.2);
            color: #c084fc;
            border: 1px solid rgba(139, 92, 246, 0.4);
            white-space: nowrap;
        }

        .cve-archive-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        /* CVE 상세 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 24px;
            width: 90%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
        }

        .modal-close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header>
        <div class="header-title-group">
            <h1 class="main-title">DAILY SECURITY NEWS</h1>
            <div class="agent-logo-box">
                <img src="/jopani.png" alt="jopani" class="agent-avatar-img" onerror="this.src='https://via.placeholder.com/36?text=JP'">
                <div class="agent-info">
                    <span class="agent-name">bobo</span>
                    <span class="agent-sub">News AI Agent</span>
                </div>
            </div>
        </div>
        <div class="system-time" id="current-time">시스템 시간: 계산 중...</div>
    </header>

    <!-- 대시보드 레이아웃 -->
    <div class="dashboard-container">

        <!-- 왼쪽 메인: 카테고리별 뉴스 목록 -->
        <section class="card news-section">
            <div class="card-header">
                <h2 class="card-title">🚨 금일 신규 보안 이슈</h2>
                <span style="font-size: 12px; color: var(--text-secondary);">카테고리를 선택하세요</span>
            </div>

            <!-- 카테고리 선택 탭 -->
            <div class="category-tabs">
                <button class="tab-btn" onclick="selectCategory('침해', this)">침해</button>
                <button class="tab-btn" onclick="selectCategory('해킹', this)">해킹</button>
                <button class="tab-btn" onclick="selectCategory('개인정보', this)">개인정보</button>
                <button class="tab-btn" onclick="selectCategory('기타보안', this)">기타</button>
            </div>

            <ul class="news-list" id="new-cve-list">
                <li style="color: var(--text-secondary); font-size:13px; padding:20px 0; text-align:center;">
                    카테고리를 선택하면 해당 분야의 오늘 자 신규 뉴스를 확인하실 수 있습니다.
                </li>
            </ul>
        </section>

        <!-- 오른쪽 컬럼 (2단 구조) -->
        <div class="right-column">

            <!-- 1. 오늘의 보안 뷰포인트 -->
            <section class="card ciso-card">
                <div class="card-header">
                    <h2 class="card-title" style="color: var(--accent-blue);">💡 오늘의 보안 뷰포인트</h2>
                </div>
                <div class="ciso-box">
                    <p id="ciso-view-text">CISO 종합 분석 데이터를 로딩 중입니다...</p>
                </div>
            </section>

            <!-- 2. 무작위 취약점 탐색 (CVE 아카이브) -->
            <section class="card cve-archive-card" id="random-cve-box">
                <div class="card-header">
                    <h2 class="card-title" style="color: #c084fc;">🔍 랜덤 취약점(CVE) 학습</h2>
                    <span style="font-size: 11px; color: var(--text-secondary);">클릭 시 상세 브리핑</span>
                </div>
                <div class="cve-archive-body">
                    <span class="cve-badge-code" id="random-cve-badge">CVE-CODE</span>
                    <div class="cve-archive-title" id="random-cve-title">데이터를 불러오는 중...</div>
                </div>
            </section>

        </div>

    </div>

    <!-- CVE 상세 모달 -->
    <div class="modal-overlay" id="cve-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="font-size:16px; color:var(--text-primary);">취약점 상세 정보</h3>
                <button class="modal-close-btn" id="modal-close">&times;</button>
            </div>
            <p id="modal-summary" style="font-size:14px; color:var(--text-secondary); line-height:1.6;"></p>
            <div style="text-align: right; margin-top: 8px;">
                <a id="modal-link" href="#" target="_blank" style="color: var(--accent-blue); font-size: 13px; text-decoration: none; font-weight: 600;">원문 공지 보기 &rarr;</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('current-time').innerText = "시스템 시간: " + new Date().toLocaleString();

        let globalNewsData = {};
        let randomCveData = null;
        let currentSelectedCategory = null;

        // 대시보드 종합 데이터 가져오기
        async function fetchDashboardData(category = null) {
            try {
                const url = category ? `/api/dashboard?category=${encodeURIComponent(category)}` : '/api/dashboard';
                const response = await fetch(url);
                const data = await response.json();

                // 1. CISO 뷰포인트 업데이트
                if (data.ciso_view) {
                    document.getElementById('ciso-view-text').innerText = data.ciso_view;
                }

                // 2. 무작위 CVE
                if (data.random_cve) {
                    randomCveData = data.random_cve;
                    document.getElementById('random-cve-title').innerText = data.random_cve.title;
                    const badge = document.getElementById('random-cve-badge');
                    if (data.random_cve.cve_code) {
                        badge.innerText = data.random_cve.cve_code;
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }
                }

                // 3. 카테고리별 뉴스 캐시 및 화면 렌더링
                if (data.news_by_category) {
                    globalNewsData = data.news_by_category;
                    if (currentSelectedCategory) {
                        renderNewsList(currentSelectedCategory);
                    }
                }

            } catch (error) {
                console.error("인텔리전스 데이터 연동 실패:", error);
                document.getElementById('ciso-view-text').innerText = "API 게이트웨이 연결 실패 (백엔드 서버 상태를 확인하세요)";
            }
        }

        // 카테고리 탭 선택 시 실행
        function selectCategory(category, btnElement) {
            currentSelectedCategory = category;

            // 탭 스타일 활성화
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');

            // 뉴스 목록 렌더링
            renderNewsList(category);

            // 해당 카테고리에 맞는 동적 CISO 뷰포인트 백엔드 재요청
            fetchDashboardData(category);
        }

        // 뉴스 목록 UI 렌더링
        function renderNewsList(category) {
            const newsListEl = document.getElementById('new-cve-list');
            newsListEl.innerHTML = '';

            const newsList = globalNewsData[category] || [];

            if (newsList.length === 0) {
                newsListEl.innerHTML = `<li style="color: var(--text-secondary); font-size:13px; padding:30px 0; text-align:center;">오늘 [${category}] 카테고리로 등록된 신규 보안 뉴스가 없습니다.</li>`;
                return;
            }

            newsList.forEach(news => {
                const li = document.createElement('li');
                li.className = 'news-item';
                li.onclick = () => { if (news.link) window.open(news.link, '_blank'); };

                li.innerHTML = `
                    <div class="news-header-meta">
                        <span class="news-badge">${news.source ? news.source : '보안뉴스'}</span>
                        <span class="news-date">${news.created_at}</span>
                    </div>
                    <div class="news-item-title" title="${news.title}">${news.title}</div>
                `;
                newsListEl.appendChild(li);
            });
        }

        // 모달 조작 이벤트
        const modal = document.getElementById('cve-modal');
        document.getElementById('random-cve-box').addEventListener('click', () => {
            if (!randomCveData) return;
            document.getElementById('modal-title').innerText = randomCveData.title;
            document.getElementById('modal-summary').innerText = randomCveData.summary ? randomCveData.summary : "상세 기술 요약 아카이브가 존재하지 않습니다.";
            document.getElementById('modal-link').href = randomCveData.link;
            modal.style.display = 'flex';
        });

        document.getElementById('modal-close').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // 초기 데이터 로드 (카테고리 선택 없는 기본 안내 상태)
        fetchDashboardData();
    </script>
</body>
</html>
