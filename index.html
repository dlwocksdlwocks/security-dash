<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보보안센터 일일 보안 알람 - NASA</title>
    <style>
        :root {
            /* 메인 컬러 팔레트 (소프트 & 하이테크 드라이브) */
            --bg-dark: #0b0f19;
            --card-bg: rgba(23, 32, 54, 0.7);
            --card-inner-bg: rgba(15, 23, 42, 0.55);
            --card-border: rgba(255, 255, 255, 0.08);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            /* 그래디언트 Accent 컬러 */
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-amber: #f59e0b;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            
            --grad-blue: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --grad-purple: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            --grad-amber: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 1. 헤더 영역 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            padding: 18px 28px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .header-title-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .main-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .agent-logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 6px 14px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }

        .agent-avatar-img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-blue);
        }

        .agent-info {
            display: flex;
            flex-direction: column;
        }

        .agent-name {
            font-size: 13px;
            font-weight: 700;
            color: #60a5fa;
            line-height: 1.2;
        }

        .agent-sub {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .system-time {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
        }

        /* 2. 대시보드 구조 */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1.15fr 1fr;
            gap: 20px;
            flex: 1;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 18px;
            height: 100%;
        }

        /* 3. 카드 공통 컴포넌트 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            padding: 22px 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .right-column .card {
            min-height: 0;
        }

        /* 개별 카드 특화 호버 및 비주얼 효과 */
        .right-column .ciso-card { 
            flex: 1.2; 
            border-left: 5px solid var(--accent-blue);
        }
        
        .right-column .notice-card { 
            flex: 1.5; 
            border-left: 5px solid var(--accent-amber);
        }
        
        .right-column .cve-archive-card { 
            flex: 0.8; 
            border-left: 5px solid var(--accent-purple);
        }

        .card:hover {
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 255, 255, 0.03);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--card-border);
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 4. 카테고리 탭 버튼 */
        .news-section { height: 100%; }

        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 14px;
            background: var(--card-inner-bg);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
        }

        .tab-btn.active {
            background: var(--grad-blue);
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.35);
        }

        /* 5. 뉴스 리스트 */
        .news-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
            max-height: 520px;
            padding-right: 4px;
        }

        .news-item {
            background: var(--card-inner-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 14px 18px;
            transition: all 0.25s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .news-item:hover {
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateX(4px);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .news-header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .news-date {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .news-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }

        /* 6. CISO 카드 내부 */
        .ciso-box {
            background: rgba(59, 130, 246, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 16px;
            flex: 1;
            display: flex;
            align-items: center;
            overflow-y: auto;
        }

        #ciso-view-text {
            font-size: 15px;
            line-height: 1.6;
            color: #ffffff;
            font-weight: 600;
            word-break: keep-all;
            white-space: pre-line;
        }

        /* 7. KISA 보호나라 공지 목록 */
        .notice-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex: 1;
        }

        .notice-item {
            font-size: 13px;
            color: var(--text-primary);
            background: var(--card-inner-bg);
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
        }

        .notice-item:hover {
            border-color: rgba(245, 158, 11, 0.6);
            color: #fbbf24;
            transform: translateX(3px);
            background: rgba(245, 158, 11, 0.08);
        }

        /* 보호나라 바로가기 버튼 */
        .notice-more-btn {
            margin-top: 12px;
            width: 100%;
            padding: 12px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
            font-size: 13px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .notice-more-btn:hover {
            background: var(--grad-amber);
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.35);
            transform: translateY(-2px);
        }

        .notice-more-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* 8. 데일리 CVE 카드 */
        .cve-archive-card {
            cursor: pointer;
        }

        .cve-archive-body {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            background: var(--card-inner-bg);
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            transition: all 0.25s ease;
        }

        .cve-archive-card:hover .cve-archive-body {
            border-color: rgba(139, 92, 246, 0.5);
            background: rgba(139, 92, 246, 0.1);
        }

        .cve-badge-code {
            font-size: 12px;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 10px;
            background: rgba(139, 92, 246, 0.25);
            color: #c084fc;
            border: 1px solid rgba(139, 92, 246, 0.4);
            white-space: nowrap;
        }

        .cve-archive-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        /* 9. CVE 상세 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 22px;
            padding: 28px;
            width: 90%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            animation: modalFadeIn 0.25s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 14px;
        }

        .modal-close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.4);
        }

        .modal-link-btn {
            display: inline-block;
            padding: 10px 18px;
            background: var(--grad-blue);
            color: #ffffff;
            font-size: 13px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }

        .modal-link-btn:hover {
            box-shadow: 0 6px 18px rgba(59, 130, 246, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header>
        <div class="header-title-group">
            <h1 class="main-title">DAILY SECURITY NEWS</h1>
            <div class="agent-logo-box">
                <img src="/jopani.png" alt="jopani" class="agent-avatar-img" onerror="this.src='https://via.placeholder.com/34?text=JP'">
                <div class="agent-info">
                    <span class="agent-name">bobo</span>
                    <span class="agent-sub">News AI Agent</span>
                </div>
            </div>
        </div>
        <div class="system-time" id="current-time">시스템 시간: 계산 중...</div>
    </header>

    <!-- 대시보드 레이아웃 -->
    <div class="dashboard-container">

        <!-- 왼쪽 메인: 카테고리별 뉴스 목록 -->
        <section class="card news-section">
            <div class="card-header">
                <h2 class="card-title">🚨 금일 신규 보안 이슈</h2>
                <span style="font-size: 12px; color: var(--text-secondary);">카테고리를 선택하세요</span>
            </div>

            <!-- 카테고리 선택 탭 -->
            <div class="category-tabs">
                <button class="tab-btn" onclick="selectCategory('침해', this)">침해</button>
                <button class="tab-btn" onclick="selectCategory('해킹', this)">해킹</button>
                <button class="tab-btn" onclick="selectCategory('개인정보', this)">개인정보</button>
                <button class="tab-btn" onclick="selectCategory('기타보안', this)">기타</button>
            </div>

            <ul class="news-list" id="new-cve-list">
                <li style="color: var(--text-secondary); font-size:13px; padding:30px 0; text-align:center;">
                    카테고리를 선택하면 해당 분야의 최신 보안 뉴스를 확인하실 수 있습니다.
                </li>
            </ul>
        </section>

        <!-- 오른쪽 컬럼 (3단 구조) -->
        <div class="right-column">

            <!-- 1. 오늘의 보안 뷰포인트 -->
            <section class="card ciso-card">
                <div class="card-header">
                    <h2 class="card-title" style="color: #60a5fa;">💡 오늘의 보안 뷰포인트</h2>
                </div>
                <div class="ciso-box">
                    <p id="ciso-view-text">CISO 종합 분석 데이터를 로딩 중입니다...</p>
                </div>
            </section>

            <!-- 2. KISA 보호나라 보안공지 -->
            <section class="card notice-card">
                <div class="card-header">
                    <h2 class="card-title" style="color: #fbbf24;">📢 KISA 보안 공지</h2>
                    <span id="notice-date-badge" style="font-size: 11px; color: var(--text-secondary);">최신 게시일 조회 중</span>
                </div>
                <ul class="notice-list" id="bohonara-notice-list">
                    <li style="color: var(--text-secondary); font-size:12px; text-align:center; padding:10px 0;">
                        보안 공지 수집 중입니다...
                    </li>
                </ul>

                <button class="notice-more-btn" onclick="window.open('https://www.boho.or.kr/kr/bbs/list.do?menuNo=205020&bbsId=B0000133', '_blank')">
                    <span>보호나라 게시판 바로가기</span>
                    <span style="font-size: 14px;">&rarr;</span>
                </button>
            </section>

            <!-- 3. 무작위 취약점 탐색 (CVE 아카이브) -->
            <section class="card cve-archive-card" id="random-cve-box">
                <div class="card-header">
                    <h2 class="card-title" style="color: #c084fc;">🔍 데일리 CVE</h2>
                    <span style="font-size: 11px; color: var(--text-secondary);">클릭 시 상세 브리핑</span>
                </div>
                <div class="cve-archive-body">
                    <span class="cve-badge-code" id="random-cve-badge">CVE-CODE</span>
                    <div class="cve-archive-title" id="random-cve-title">데이터를 불러오는 중...</div>
                </div>
            </section>

        </div>

    </div>

    <!-- CVE 상세 모달 -->
    <div class="modal-overlay" id="cve-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="font-size:16px; color:var(--text-primary);">취약점 상세 정보</h3>
                <button class="modal-close-btn" id="modal-close">&times;</button>
            </div>
            <p id="modal-summary" style="font-size:14px; color:var(--text-secondary); line-height:1.6;"></p>
            <div style="text-align: right; margin-top: 8px;">
                <a id="modal-link" class="modal-link-btn" href="#" target="_blank">원문 공지 보기 &rarr;</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('current-time').innerText = "시스템 시간: " + new Date().toLocaleString();

        let globalNewsData = {};
        let randomCveData = null;
        let currentSelectedCategory = null;

        // 대시보드 종합 데이터 가져오기
        async function fetchDashboardData(category = null) {
            try {
                const url = category ? `/api/dashboard?category=${encodeURIComponent(category)}` : '/api/dashboard';
                const response = await fetch(url);
                const data = await response.json();

                // 1. CISO 뷰포인트 업데이트
                if (data.ciso_view) {
                    document.getElementById('ciso-view-text').innerText = data.ciso_view;
                }

                // 2. KISA 보호나라 공지사항 업데이트
                if (data.latest_notices) {
                    renderNotices(data.latest_notices);
                }

                // 3. 무작위 CVE
                if (data.random_cve) {
                    randomCveData = data.random_cve;
                    document.getElementById('random-cve-title').innerText = data.random_cve.title;
                    const badge = document.getElementById('random-cve-badge');
                    if (data.random_cve.cve_code) {
                        badge.innerText = data.random_cve.cve_code;
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }
                }

                // 4. 카테고리별 뉴스 캐시 및 화면 렌더링
                if (data.news_by_category) {
                    globalNewsData = data.news_by_category;
                    if (currentSelectedCategory) {
                        renderNewsList(currentSelectedCategory);
                    }
                }

            } catch (error) {
                console.error("인텔리전스 데이터 연동 실패:", error);
                document.getElementById('ciso-view-text').innerText = "API 게이트웨이 연결 실패 (백엔드 서버 상태를 확인하세요)";
            }
        }

        // 보호나라 공지 목록 렌더링
        function renderNotices(noticeData) {
            const listEl = document.getElementById('bohonara-notice-list');
            const badgeEl = document.getElementById('notice-date-badge');
            listEl.innerHTML = '';

            if (noticeData.target_date) {
                badgeEl.innerText = `최신 게시일: ${noticeData.target_date}`;
            }

            if (!noticeData.list || noticeData.list.length === 0) {
                listEl.innerHTML = `<li style="color: var(--text-secondary); font-size:12px; text-align:center; padding:10px 0;">등록된 최신 보안 공지가 없습니다.</li>`;
                return;
            }

            noticeData.list.forEach(n => {
                const li = document.createElement('li');
                li.className = 'notice-item';
                li.title = n.title;
                li.innerText = `• ${n.title}`;
                li.onclick = () => window.open(n.link, '_blank');
                listEl.appendChild(li);
            });
        }

        // 카테고리 탭 선택 시 실행
        function selectCategory(category, btnElement) {
            currentSelectedCategory = category;

            // 탭 스타일 활성화
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');

            // 뉴스 목록 렌더링
            renderNewsList(category);

            // 해당 카테고리에 맞는 동적 CISO 뷰포인트 백엔드 재요청
            fetchDashboardData(category);
        }

        // 뉴스 목록 UI 렌더링
        function renderNewsList(category) {
            const newsListEl = document.getElementById('new-cve-list');
            newsListEl.innerHTML = '';

            const newsList = globalNewsData[category] || [];

            if (newsList.length === 0) {
                newsListEl.innerHTML = `<li style="color: var(--text-secondary); font-size:13px; padding:30px 0; text-align:center;">[${category}] 카테고리로 등록된 보안 뉴스가 없습니다.</li>`;
                return;
            }

            newsList.forEach(news => {
                const li = document.createElement('li');
                li.className = 'news-item';
                li.onclick = () => { if (news.link) window.open(news.link, '_blank'); };

                li.innerHTML = `
                    <div class="news-header-meta">
                        <span class="news-badge">${news.source ? news.source : '보안뉴스'}</span>
                        <span class="news-date">${news.created_at}</span>
                    </div>
                    <div class="news-item-title" title="${news.title}">${news.title}</div>
                `;
                newsListEl.appendChild(li);
            });
        }

        // 모달 조작 이벤트
        const modal = document.getElementById('cve-modal');
        document.getElementById('random-cve-box').addEventListener('click', () => {
            if (!randomCveData) return;
            document.getElementById('modal-title').innerText = randomCveData.title;
            document.getElementById('modal-summary').innerText = randomCveData.summary ? randomCveData.summary : "상세 기술 요약 아카이브가 존재하지 않습니다.";
            document.getElementById('modal-link').href = randomCveData.link;
            modal.style.display = 'flex';
        });

        document.getElementById('modal-close').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // 초기 데이터 로드
        fetchDashboardData();
    </script>
</body>
</html>
