<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보보안센터 일일 보안 알람 - NASA</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-amber: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 헤더 영역 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 16px 24px;
            border-radius: 12px;
        }

        .header-title-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .agent-logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .agent-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
        }

        .agent-info {
            display: flex;
            flex-direction: column;
        }

        .agent-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-blue);
            line-height: 1.2;
        }

        .agent-sub {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .main-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .system-time {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 대시보드 메인 그리드 레이아웃 */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* 왼쪽 메인 1.2 : 오른쪽 1 */
            gap: 20px;
            flex: 1;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 카드 공통 스타일 */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }

        .card-title {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 1. 왼쪽 메인: 금일 신규 보안 사고 (뉴스) */
        .news-section {
            height: 100%;
        }

        .news-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .news-item {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .news-item:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            background-color: rgba(30, 41, 59, 0.9);
        }

        .news-header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .news-date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .news-item-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 2. 오른쪽 상단: 오늘의 보안 뷰포인트 */
        .ciso-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-left: 4px solid var(--accent-blue);
            flex: 1;
        }

        .ciso-box {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            padding: 20px;
            font-size: 15px;
            line-height: 1.6;
            color: #e2e8f0;
            font-weight: 500;
            flex: 1;
            display: flex;
            align-items: center;
        }

        /* 3. 오른쪽 하단: 금일 개인정보 유출 사례 브리핑 */
        .leak-card {
            border-left: 4px solid var(--accent-red);
            flex: 1.2;
        }

        .leak-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .leak-article-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent-amber);
            line-height: 1.4;
        }

        .leak-article-summary {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            flex: 1;
        }
    </style>
</head>
<body>

    <!-- 상단 헤더 -->
    <header>
        <div class="header-title-group">
            <h1 class="main-title">정보보안센터 일일 보안 알람</h1>
            <div class="agent-logo-box">
                <div class="agent-avatar">AI</div>
                <div class="agent-info">
                    <span class="agent-name">NASA</span>
                    <span class="agent-sub">News AI Security Agent</span>
                </div>
            </div>
        </div>
        <div class="system-time" id="current-time">시스템 시간: 계산 중...</div>
    </header>

    <!-- 대시보드 메인 레이아웃 -->
    <div class="dashboard-container">

        <!-- 1. 왼쪽 메인: 금일 신규 보안 사고 (최신 뉴스 5개) -->
        <section class="card news-section">
            <div class="card-header">
                <h2 class="card-title">🚨 금일 신규 보안 사고 동향</h2>
                <span style="font-size: 12px; color: var(--text-secondary);">실시간 수집 5건</span>
            </div>
            <ul class="news-list" id="new-cve-list">
                <li style="color: var(--text-secondary); font-size:13px; padding:20px 0; text-align:center;">
                    보안 기사를 수집 및 분석하는 중입니다...
                </li>
            </ul>
        </section>

        <!-- 오른쪽 컬럼 (뷰포인트 + 유출 브리핑) -->
        <div class="right-column">

            <!-- 2. 오른쪽 상단: 오늘의 보안 뷰포인트 -->
            <section class="card ciso-card">
                <div class="card-header">
                    <h2 class="card-title" style="color: var(--accent-blue);">💡 오늘의 보안 뷰포인트</h2>
                </div>
                <div class="ciso-box">
                    <p id="ciso-view-text">CISO 종합 분석 데이터를 로딩 중입니다...</p>
                </div>
            </section>

            <!-- 3. 오른쪽 하단: 금일 개인정보 유출 사례 브리핑 -->
            <section class="card leak-card">
                <div class="card-header">
                    <h2 class="card-title" style="color: var(--accent-red);">🛡️ 금일 개인정보 유출 사례 브리핑</h2>
                </div>
                <div class="leak-content">
                    <div class="leak-article-title" id="leak-title">유출 동향 분석 중...</div>
                    <div class="leak-article-summary" id="leak-summary">
                        최근 기사 중 데이터 침해 및 유출 관련 사건을 추출하고 있습니다.
                    </div>
                </div>
            </section>

        </div>

    </div>

    <script>
        document.getElementById('current-time').innerText = "시스템 시간: " + new Date().toLocaleString();

        async function fetchDashboardData() {
            try {
                const response = await fetch('/api/dashboard');
                const data = await response.json();

                // 1. 오늘의 보안 뷰포인트 렌더링
                document.getElementById('ciso-view-text').innerText = data.ciso_view;

                // 2. 개인정보 유출 브리핑 렌더링
                document.getElementById('leak-title').innerText = data.leak_section.title;
                document.getElementById('leak-summary').innerText = data.leak_section.summary;

                // 3. 왼쪽 메인: 금일 신규 보안 사고 뉴스 목록 렌더링
                const newsListEl = document.getElementById('new-cve-list');
                newsListEl.innerHTML = '';
                
                const newsList = data.latest_news || [];

                if (newsList.length === 0) {
                    newsListEl.innerHTML = '<li style="color: var(--text-secondary); font-size:13px; padding:20px 0; text-align:center;">최근 수집된 보안 뉴스가 없습니다.</li>';
                } else {
                    newsList.forEach(news => {
                        const li = document.createElement('li');
                        li.className = 'news-item';

                        // 클릭 시 뉴스 원본 링크 이동
                        li.onclick = () => { if (news.link) window.open(news.link, '_blank'); };

                        li.innerHTML = `
                            <div class="news-header-meta">
                                <span class="news-badge">${news.source ? news.source : '보안뉴스'}</span>
                                <span class="news-date">${news.created_at}</span>
                            </div>
                            <div class="news-item-title" title="${news.title}">${news.title}</div>
                        `;
                        newsListEl.appendChild(li);
                    });
                }

            } catch (error) {
                console.error("인텔리전스 데이터 연동 실패:", error);
                document.getElementById('ciso-view-text').innerText = "API 게이트웨이 연결 실패 (백엔드 서버 상태를 확인하세요)";
            }
        }

        fetchDashboardData();
    </script>
</body>
</html>
